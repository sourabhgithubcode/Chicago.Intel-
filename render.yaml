services:
  - type: web
    name: chicago-intel-frontend
    runtime: static
    # Substitute __GOOGLE_MAPS_KEY__ placeholder in the HTML with the real
    # key from the GOOGLE_MAPS_KEY env var, then verify the substitution
    # actually happened (fail the build if the placeholder is still present).
    buildCommand: sed -i "s|__GOOGLE_MAPS_KEY__|$GOOGLE_MAPS_KEY|g" public/index.html && ! grep -q "__GOOGLE_MAPS_KEY__" public/index.html
    staticPublishPath: ./public
    envVars:
      - key: GOOGLE_MAPS_KEY
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: cron
    name: chicago-intel-data-pipeline
    runtime: python
    schedule: "0 3 1 */3 *"  # 3am on 1st day of every 3rd month
    buildCommand: pip install -r scripts/requirements.txt
    startCommand: python scripts/run_all_fetchers.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CENSUS_API_KEY
        sync: false
      - key: CHICAGO_DATA_TOKEN
        sync: false
      # Bronze layer — raw JSONL archive (Cloudflare R2)
      - key: BRONZE_BACKEND
        value: r2
      - key: BRONZE_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
