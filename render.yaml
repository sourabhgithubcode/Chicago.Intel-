services:
  - type: web
    name: chicago-intel-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_TREASURER_API_URL
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ─── Data pipeline cron jobs ───────────────────────────────────────────
  # Per-source schedules keyed to how often each source actually publishes.
  # Freeze status (memory: project_data_load_freeze.md): the daily cron
  # (cpd, 311) is VALIDATED — transformer output reproduces prod silver, so it
  # loads silver (no --bronze-only). The monthly (assessor) + quarterly crons
  # stay --bronze-only until their transformers are validated the same way.

  # CPD crime + 311 violations — daily (sources update continuously)
  - type: cron
    name: chicago-intel-pipeline-daily
    runtime: python
    schedule: "0 9 * * *"  # 4am Central daily
    buildCommand: pip install -r scripts/requirements.txt
    startCommand: python scripts/orchestrator.py --sources cpd,311 --skip-backup
    envVars: &cron_env
      # Incremental window for the daily silver load — only cpd/311 fetchers
      # read it. 90d safely covers the freeze gap and re-catches updated rows;
      # the upsert is idempotent (ON CONFLICT by PK) so re-loading the window
      # daily is cheap. The bronze-only crons inherit it harmlessly.
      - key: INCREMENTAL_DAYS
        value: "90"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CHICAGO_DATA_TOKEN
        sync: false
      - key: COOK_COUNTY_TOKEN
        sync: false
      - key: CENSUS_API_KEY
        sync: false
      - key: BRONZE_BUCKET
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false

  # Cook County Assessor — monthly (annual snapshots + sales trickle)
  - type: cron
    name: chicago-intel-pipeline-monthly
    runtime: python
    schedule: "0 9 1 * *"  # 4am Central, 1st of every month
    buildCommand: pip install -r scripts/requirements.txt
    startCommand: python scripts/orchestrator.py --sources assessor --bronze-only --skip-backup
    envVars: *cron_env

  # CTA stops, parks, streets, ACS — quarterly (these sources rarely change)
  - type: cron
    name: chicago-intel-pipeline-quarterly
    runtime: python
    schedule: "0 9 1 */3 *"  # 4am Central, 1st of Jan/Apr/Jul/Oct
    buildCommand: pip install -r scripts/requirements.txt
    startCommand: python scripts/orchestrator.py --sources cta,parks,streets,acs --bronze-only --skip-backup
    envVars: *cron_env

  # ─── Treasurer per-PIN scrape service ──────────────────────────────────
  # Lives outside the Edge Function path because Deno's strict rustls rejects
  # CCT's misconfigured cert chain (browsers + Python's certifi accept it via
  # AIA chasing). Free tier — first request after 15min idle takes ~30s
  # cold-start; warm requests sub-second. Aggressive 30d cache softens this.
  - type: web
    name: chicago-intel-treasurer
    runtime: python
    plan: free
    buildCommand: pip install -r scripts/requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT --chdir scripts treasurer_service:app
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      # Live-API connector keys — set in Render Dashboard (sync: false hides
      # the value from the YAML). Missing keys cause the corresponding route
      # to return 503; other routes keep working.
      - key: GOOGLE_PLACES_KEY
        sync: false
      - key: AIRNOW_API_KEY
        sync: false
      - key: RENTCAST_API_KEY
        sync: false
      - key: HOWLOUD_API_KEY
        sync: false
      - key: MAPBOX_TOKEN
        sync: false
      - key: FOURSQUARE_API_KEY
        sync: false
